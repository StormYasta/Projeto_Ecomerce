<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pedido</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = '../index.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Cadastro de Pedido</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Cadastrar</a>
                <a href="./editar.html">Editar</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <section class="panel active">

            <h2>Novo Pedido</h2>

            <form id="form-pedido" class="entity-form">

                <div class="field-row">
                    <label for="clienteId">Cliente</label>
                    <select id="clienteId" name="clienteId" required>
                        <option value="" disabled selected>Carregando clientes...</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="produtoId">Produto</label>
                    <select id="produtoId" name="produtoId" required>
                        <option value="" disabled selected>Carregando produtos...</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="statusId">Status</label>
                    <select id="statusId" name="statusId" required>
                        <option value="" disabled selected>Carregando status...</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="dataPedido">Data do Pedido</label>
                    <input id="dataPedido" name="dataPedido" placeholder="dd/mm/aaaa" required>
                </div>

                <button type="submit">
                    Salvar Pedido
                </button>
            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando envio...</pre>
    </aside>

    <script src="cadastrar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
