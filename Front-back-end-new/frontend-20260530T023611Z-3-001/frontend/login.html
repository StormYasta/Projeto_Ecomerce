<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">Tela de Login</div>
        <nav class="nav-bar">
            <a class="secondary-button" href="index.html">Ir para Cadastro</a>
            <a class="secondary-button" href="view.html">Visualizar</a>
        </nav>
    </header>
    <main class="page">
        <section class="panel active" id="login-panel">
            <h2>Entrar</h2>
            <form id="login-form" class="entity-form">
                <div class="field-row"><label for="login-username">Usuário</label><input id="login-username" name="username" type="text" placeholder="Digite o login" required></div>
                <div class="field-row"><label for="login-password">Senha</label><input id="login-password" name="password" type="password" placeholder="Digite a senha" required></div>
                <button type="submit">Entrar</button>
            </form>
            <div class="login-note">Use esta tela para acessar o cadastro e depois informe seus dados de usuário.</div>
        </section>
    </main>
    <aside class="output-panel">
        <h3>Status</h3>
        <pre id="login-output">Aguardando login...</pre>
    </aside>
    <script>
        const loginForm = document.getElementById('login-form');
        const loginOutput = document.getElementById('login-output');

        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        loginForm.addEventListener('submit', event => {
            event.preventDefault();
            const formData = new FormData(loginForm);
            const login = formData.get('username');
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('currentUser', login);
            loginOutput.textContent = `Login efetuado: ${login}\nRedirecionando para cadastro...`;
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 900);
        });
    </script>
</body>
</html>
