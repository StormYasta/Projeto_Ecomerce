<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Entidades</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <header class="topbar">
        <div class="brand">Cadastrar</div>
        <nav class="nav-bar">
            <button type="button" data-target="cliente">Cliente</button>
            <button type="button" data-target="colaborador">Colaborador</button>
            <button type="button" data-target="fornecedor">Fornecedor</button>
            <button type="button" data-target="parceiro">Parceiro</button>
            <button type="button" data-target="produto">Produto</button>
            <button type="button" data-target="pedido">Pedido</button>
            <button type="button" data-target="usuario">Usuário</button>
            <a class="secondary-button" href="view.html">Visualizar</a>
            <a class="secondary-button" href="editar.html">Editar</a>
            <a class="secondary-button" href="login.html">Login</a>
        </nav>
    </header>
    <main class="page">
        <section class="panel active" id="cliente">
            <h2>Cadastro de Cliente</h2>
            <form id="form-cliente" class="entity-form">
                <div class="field-row">
                    <label for="cliente-nome">Nome</label>
                    <input id="cliente-nome" name="nome" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-sobrenome">Sobrenome</label>
                    <input id="cliente-sobrenome" name="sobrenome" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-cpf">CPF</label>
                    <input id="cliente-cpf" name="cpf" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-status">Status</label>
                    <select id="cliente-status" name="statusId">
                        <option value="1">ATIVO</option>
                        <option value="2">INATIVO</option>
                        <option value="3">BLOQUEADO</option>
                    </select>
                </div>
                <div class="field-row">
                    <label for="cliente-dataNascimento">
                        Data de Nascimento
                    </label>
                    <input id="cliente-dataNascimento" name="dataNascimento" type="date" required>
                </div>
                <div class="field-row">
                    <label for="cliente-nomeSocial">Nome Social</label>
                    <input id="cliente-nomeSocial" name="nomeSocial" type="text">
                </div>
                <div class="field-row">
                    <label for="cliente-sobrenomeSocial">
                        Sobrenome Social
                    </label>
                    <input id="cliente-sobrenomeSocial" name="sobrenomeSocial" type="text">
                </div>
                <div class="field-row">
                    <label for="cliente-email">Email</label>
                    <input id="cliente-email" name="email" type="email" required>
                </div>
                <div class="field-row">
                    <label for="cliente-telefone">Telefone</label>
                    <input id="cliente-telefone" name="telefone" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-cep">CEP</label>
                    <input id="cliente-cep" name="cep" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-numero">Número</label>
                    <input id="cliente-numero" name="numero" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-logradouro">Logradouro</label>
                    <input id="cliente-logradouro" name="logradouro" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-bairro">Bairro</label>
                    <input id="cliente-bairro" name="bairro" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-cidade">Cidade</label>
                    <input id="cliente-cidade" name="cidade" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-uf">UF</label>
                    <input id="cliente-uf" name="uf" type="text" maxlength="2" required>
                </div>
                <div class="field-row">
                    <label for="cliente-complemento">Complemento</label>
                    <input id="cliente-complemento" name="complemento" type="text">
                </div>
                <div class="field-row">
                    <label for="cliente-login">Login</label>
                    <input id="cliente-login" name="login" type="text" required>
                </div>
                <div class="field-row">
                    <label for="cliente-hashSenha">Senha</label>
                    <input id="cliente-hashSenha" name="hashSenha" type="password" required>
                </div>
                <button type="submit">
                    Salvar Cliente
                </button>
            </form>
        </section>

        <section class="panel" id="colaborador">
            <h2>Cadastro de Colaborador</h2>
            <form id="form-colaborador" class="entity-form">
                <div class="field-row"><label for="colaborador-nome">Nome</label><input id="colaborador-nome"
                        name="nome" type="text" required></div>
                <div class="field-row"><label for="colaborador-cpf">CPF</label><input id="colaborador-cpf" name="cpf"
                        type="text" required></div>
                <div class="field-row"><label for="colaborador-status">Status</label><select id="colaborador-status"
                        name="status">
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                        <option value="BLOQUEADO">Bloqueado</option>
                    </select></div>
                <div class="field-row"><label for="colaborador-dataNascimento">Data de Nascimento</label><input
                        id="colaborador-dataNascimento" name="dataNascimento" type="date" required></div>
                <div class="field-row"><label for="colaborador-nomeSocial">Nome Social</label><input
                        id="colaborador-nomeSocial" name="nomeSocial" type="text"></div>
                <div class="field-row"><label for="colaborador-enderecoPrincipal">Endereço Principal (ID)</label><input
                        id="colaborador-enderecoPrincipal" name="enderecoPrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-emailPrincipal">Email Principal (ID)</label><input
                        id="colaborador-emailPrincipal" name="emailPrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-telefonePrincipal">Telefone Principal (ID)</label><input
                        id="colaborador-telefonePrincipal" name="telefonePrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-funcao">Função</label><select id="colaborador-funcao"
                        name="funcao">
                        <option value="ADMIN">Administrador</option>
                        <option value="VENDEDOR">Vendedor</option>
                        <option value="SUPORTE">Suporte</option>
                    </select></div>
                <div class="field-row"><label for="colaborador-salarioInicial">Salário Inicial</label><input
                        id="colaborador-salarioInicial" name="salarioInicial" type="number" step="0.01" required></div>
                <div class="field-row"><label for="colaborador-salarioAtual">Salário Atual</label><input
                        id="colaborador-salarioAtual" name="salarioAtual" type="number" step="0.01" required></div>
                <div class="field-row"><label for="colaborador-dataRegistro">Data de Registro</label><input
                        id="colaborador-dataRegistro" name="dataRegistro" type="date" required></div>
                <div class="field-row"><label for="colaborador-numCarteira">Número da CTPS</label><input
                        id="colaborador-numCarteira" name="numCarteiraTrabalho" type="text" required></div>
                <div class="field-row"><label for="colaborador-numCnh">Número CNH</label><input id="colaborador-numCnh"
                        name="numCnh" type="text"></div>
                <div class="field-row"><label for="colaborador-dataRescisao">Data de Rescisão</label><input
                        id="colaborador-dataRescisao" name="dataRescisao" type="date"></div>
                <button type="submit">Salvar Colaborador</button>
            </form>
        </section>

        <section class="panel" id="fornecedor">
            <h2>Cadastro de Fornecedor</h2>
            <form id="form-fornecedor" class="entity-form">
                <div class="field-row"><label for="fornecedor-nome">Nome</label><input id="fornecedor-nome" name="nome"
                        type="text" required></div>
                <div class="field-row"><label for="fornecedor-cnpj">CNPJ</label><input id="fornecedor-cnpj" name="cnpj"
                        type="text" required></div>
                <div class="field-row"><label for="fornecedor-representante">Representante (Parceiro ID)</label><input
                        id="fornecedor-representante" name="representante" type="number" required></div>
                <div class="list-group" id="fornecedor-telefones-group">
                    <div class="group-header"><span>Telefones</span><button type="button" class="small-button"
                            data-add="fornecedorTelefone">+ Adicionar</button></div>
                    <div id="fornecedor-telefones"></div>
                </div>
                <div class="list-group" id="fornecedor-emails-group">
                    <div class="group-header"><span>Emails</span><button type="button" class="small-button"
                            data-add="fornecedorEmail">+ Adicionar</button></div>
                    <div id="fornecedor-emails"></div>
                </div>
                <button type="submit">Salvar Fornecedor</button>
            </form>
        </section>

        <section class="panel" id="parceiro">
            <h2>Cadastro de Parceiro</h2>
            <form id="form-parceiro" class="entity-form">
                <div class="field-row"><label for="parceiro-pessoaId">ID da Pessoa</label><input id="parceiro-pessoaId"
                        name="pessoaId" type="number" required></div>
                <div class="field-row"><label for="parceiro-area">Área</label><select id="parceiro-area" name="area">
                        <option value="COMERCIAL">Comercial</option>
                        <option value="TECNOLOGIA">Tecnologia</option>
                        <option value="LOGISTICA">Logística</option>
                    </select></div>
                <button type="submit">Salvar Parceiro</button>
            </form>
        </section>

        <section class="panel" id="produto">
            <h2>Cadastro de Produto</h2>
            <form id="form-produto" class="entity-form">
                <div class="field-row"><label for="produto-nome">Nome</label><input id="produto-nome" name="nome"
                        type="text" required></div>
                <div class="field-row"><label for="produto-descricao">Descrição</label><textarea id="produto-descricao"
                        name="descricao" rows="3" required></textarea></div>
                <div class="field-row"><label for="produto-precoVenda">Preço de Venda</label><input
                        id="produto-precoVenda" name="precoVenda" type="number" step="0.01" required></div>
                <div class="field-row"><label for="produto-custo">Custo</label><input id="produto-custo" name="custo"
                        type="number" step="0.01" required></div>
                <div class="field-row"><label for="produto-estoque">Estoque</label><input id="produto-estoque"
                        name="estoque" type="number" required></div>
                <div class="field-row"><label for="produto-fornecedor">Fornecedor (ID)</label><input
                        id="produto-fornecedor" name="fornecedor" type="number" required></div>
                <div class="field-row"><label for="produto-imagemUrl">URL da Imagem</label><input id="produto-imagemUrl"
                        name="imagemUrl" type="url"></div>
                <button type="submit">Salvar Produto</button>
            </form>
        </section>

        <section class="panel" id="pedido">
            <h2>Cadastro de Pedido</h2>
            <form id="form-pedido" class="entity-form">
                <div class="field-row"><label for="pedido-cliente">Cliente (ID)</label><input id="pedido-cliente"
                        name="cliente" type="number" required></div>
                <div class="field-row"><label for="pedido-dataPedido">Data do Pedido</label><input
                        id="pedido-dataPedido" name="dataPedido" type="datetime-local" required></div>
                <div class="field-row"><label for="pedido-status">Status</label><select id="pedido-status"
                        name="status">
                        <option value="PENDENTE">Pendente</option>
                        <option value="CONFIRMADO">Confirmado</option>
                        <option value="ENTREGUE">Entregue</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select></div>
                <div class="list-group" id="pedido-itens-group">
                    <div class="group-header"><span>Itens do Pedido</span><button type="button" class="small-button"
                            data-add="pedidoItem">+ Adicionar</button></div>
                    <div id="pedido-itens"></div>
                </div>
                <button type="submit">Salvar Pedido</button>
            </form>
        </section>

        <section class="panel" id="usuario">
            <h2>Cadastro de Usuário</h2>
            <form id="form-usuario" class="entity-form">
                <div class="field-row"><label for="usuario-pessoaId">ID da Pessoa</label><input id="usuario-pessoaId"
                        name="pessoaId" type="number" required></div>
                <div class="field-row"><label for="usuario-role">Role</label><select id="usuario-role" name="role">
                        <option value="ADMIN">Admin</option>
                        <option value="USUARIO">Usuário</option>
                        <option value="GERENTE">Gerente</option>
                    </select></div>
                <div class="field-row"><label for="usuario-login">Login</label><input id="usuario-login" name="login"
                        type="text" required></div>
                <div class="field-row"><label for="usuario-senha">Senha</label><input id="usuario-senha"
                        name="senhaHash" type="password" required></div>
                <div class="field-row"><label for="usuario-descricao">Descrição</label><textarea id="usuario-descricao"
                        name="descricao" rows="2"></textarea></div>
                <button type="submit">Salvar Usuário</button>
            </form>
        </section>
    </main>
    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Preencha um formulário para ver os dados aqui.</pre>
    </aside>
    <script src="script.js"></script>
</body>

</html>
