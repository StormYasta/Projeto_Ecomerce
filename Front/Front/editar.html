<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Entidades</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <header class="topbar">
        <div class="brand">Editar Entidades</div>
        <nav class="nav-bar">
            <button type="button" data-target="cliente">Cliente</button>
            <button type="button" data-target="colaborador">Colaborador</button>
            <button type="button" data-target="fornecedor">Fornecedor</button>
            <button type="button" data-target="parceiro">Parceiro</button>
            <button type="button" data-target="produto">Produto</button>
            <button type="button" data-target="pedido">Pedido</button>
            <button type="button" data-target="usuario">Usuário</button>
            <a class="secondary-button" href="view.html">Visualizar</a>
            <a class="secondary-button" href="index.html">Cadastro</a>
            <a class="secondary-button" href="login.html">Login</a>
        </nav>
    </header>
    <main class="page">
        <section class="panel active" id="cliente">
            <h2>Alterar Cliente</h2>
            <form id="form-cliente" class="entity-form">
                <div class="field-row"><label for="cliente-id">Pessoa ID</label><input id="cliente-id" name="pessoaId" type="number" required></div>
                <div class="field-row"><label for="cliente-nome">Nome</label><input id="cliente-nome" name="nome" type="text"></div>
                <div class="field-row"><label for="cliente-cpf">CPF</label><input id="cliente-cpf" name="cpf" type="text"></div>
                <div class="field-row"><label for="cliente-status">Status</label><select id="cliente-status" name="status">
                    <option value="ATIVO">Ativo</option>
                    <option value="INATIVO">Inativo</option>
                    <option value="BLOQUEADO">Bloqueado</option>
                </select></div>
                <div class="field-row"><label for="cliente-dataNascimento">Data de Nascimento</label><input id="cliente-dataNascimento" name="dataNascimento" type="date"></div>
                <div class="field-row"><label for="cliente-nomeSocial">Nome Social</label><input id="cliente-nomeSocial" name="nomeSocial" type="text"></div>
                <div class="field-row"><label for="cliente-enderecoPrincipal">Endereço Principal (ID)</label><input id="cliente-enderecoPrincipal" name="enderecoPrincipal" type="number"></div>
                <div class="field-row"><label for="cliente-emailPrincipal">Email Principal (ID)</label><input id="cliente-emailPrincipal" name="emailPrincipal" type="number"></div>
                <div class="field-row"><label for="cliente-telefonePrincipal">Telefone Principal (ID)</label><input id="cliente-telefonePrincipal" name="telefonePrincipal" type="number"></div>
                <div class="field-row"><label for="cliente-ultimoPedido">Último Pedido (ID)</label><input id="cliente-ultimoPedido" name="ultimoPedido" type="number"></div>
                <button type="submit">Atualizar Cliente</button>
            </form>
        </section>

        <section class="panel" id="colaborador">
            <h2>Alterar Colaborador</h2>
            <form id="form-colaborador" class="entity-form">
                <div class="field-row"><label for="colaborador-id">Pessoa ID</label><input id="colaborador-id" name="pessoaId" type="number" required></div>
                <div class="field-row"><label for="colaborador-nome">Nome</label><input id="colaborador-nome" name="nome" type="text"></div>
                <div class="field-row"><label for="colaborador-cpf">CPF</label><input id="colaborador-cpf" name="cpf" type="text"></div>
                <div class="field-row"><label for="colaborador-status">Status</label><select id="colaborador-status" name="status">
                    <option value="ATIVO">Ativo</option>
                    <option value="INATIVO">Inativo</option>
                    <option value="BLOQUEADO">Bloqueado</option>
                </select></div>
                <div class="field-row"><label for="colaborador-dataNascimento">Data de Nascimento</label><input id="colaborador-dataNascimento" name="dataNascimento" type="date"></div>
                <div class="field-row"><label for="colaborador-nomeSocial">Nome Social</label><input id="colaborador-nomeSocial" name="nomeSocial" type="text"></div>
                <div class="field-row"><label for="colaborador-enderecoPrincipal">Endereço Principal (ID)</label><input id="colaborador-enderecoPrincipal" name="enderecoPrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-emailPrincipal">Email Principal (ID)</label><input id="colaborador-emailPrincipal" name="emailPrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-telefonePrincipal">Telefone Principal (ID)</label><input id="colaborador-telefonePrincipal" name="telefonePrincipal" type="number"></div>
                <div class="field-row"><label for="colaborador-funcao">Função</label><select id="colaborador-funcao" name="funcao">
                    <option value="ADMIN">Administrador</option>
                    <option value="VENDEDOR">Vendedor</option>
                    <option value="SUPORTE">Suporte</option>
                </select></div>
                <div class="field-row"><label for="colaborador-salarioInicial">Salário Inicial</label><input id="colaborador-salarioInicial" name="salarioInicial" type="number" step="0.01"></div>
                <div class="field-row"><label for="colaborador-salarioAtual">Salário Atual</label><input id="colaborador-salarioAtual" name="salarioAtual" type="number" step="0.01"></div>
                <div class="field-row"><label for="colaborador-dataRegistro">Data de Registro</label><input id="colaborador-dataRegistro" name="dataRegistro" type="date"></div>
                <div class="field-row"><label for="colaborador-numCarteira">Número da CTPS</label><input id="colaborador-numCarteira" name="numCarteiraTrabalho" type="text"></div>
                <div class="field-row"><label for="colaborador-numCnh">Número CNH</label><input id="colaborador-numCnh" name="numCnh" type="text"></div>
                <div class="field-row"><label for="colaborador-dataRescisao">Data de Rescisão</label><input id="colaborador-dataRescisao" name="dataRescisao" type="date"></div>
                <button type="submit">Atualizar Colaborador</button>
            </form>
        </section>

        <section class="panel" id="fornecedor">
            <h2>Alterar Fornecedor</h2>
            <form id="form-fornecedor" class="entity-form">
                <div class="field-row"><label for="fornecedor-id">ID</label><input id="fornecedor-id" name="id" type="number" required></div>
                <div class="field-row"><label for="fornecedor-nome">Nome</label><input id="fornecedor-nome" name="nome" type="text"></div>
                <div class="field-row"><label for="fornecedor-cnpj">CNPJ</label><input id="fornecedor-cnpj" name="cnpj" type="text"></div>
                <div class="field-row"><label for="fornecedor-representante">Representante (Parceiro ID)</label><input id="fornecedor-representante" name="representante" type="number"></div>
                <div class="list-group" id="fornecedor-telefones-group">
                    <div class="group-header"><span>Telefones</span><button type="button" class="small-button" data-add="fornecedorTelefone">+ Adicionar</button></div>
                    <div id="fornecedor-telefones"></div>
                </div>
                <div class="list-group" id="fornecedor-emails-group">
                    <div class="group-header"><span>Emails</span><button type="button" class="small-button" data-add="fornecedorEmail">+ Adicionar</button></div>
                    <div id="fornecedor-emails"></div>
                </div>
                <button type="submit">Atualizar Fornecedor</button>
            </form>
        </section>

        <section class="panel" id="parceiro">
            <h2>Alterar Parceiro</h2>
            <form id="form-parceiro" class="entity-form">
                <div class="field-row"><label for="parceiro-id">Pessoa ID</label><input id="parceiro-id" name="pessoaId" type="number" required></div>
                <div class="field-row"><label for="parceiro-area">Área</label><select id="parceiro-area" name="area">
                    <option value="COMERCIAL">Comercial</option>
                    <option value="TECNOLOGIA">Tecnologia</option>
                    <option value="LOGISTICA">Logística</option>
                </select></div>
                <button type="submit">Atualizar Parceiro</button>
            </form>
        </section>

        <section class="panel" id="produto">
            <h2>Alterar Produto</h2>
            <form id="form-produto" class="entity-form">
                <div class="field-row"><label for="produto-id">ID</label><input id="produto-id" name="id" type="number" required></div>
                <div class="field-row"><label for="produto-nome">Nome</label><input id="produto-nome" name="nome" type="text"></div>
                <div class="field-row"><label for="produto-descricao">Descrição</label><textarea id="produto-descricao" name="descricao" rows="3"></textarea></div>
                <div class="field-row"><label for="produto-precoVenda">Preço de Venda</label><input id="produto-precoVenda" name="precoVenda" type="number" step="0.01"></div>
                <div class="field-row"><label for="produto-custo">Custo</label><input id="produto-custo" name="custo" type="number" step="0.01"></div>
                <div class="field-row"><label for="produto-estoque">Estoque</label><input id="produto-estoque" name="estoque" type="number"></div>
                <div class="field-row"><label for="produto-fornecedor">Fornecedor (ID)</label><input id="produto-fornecedor" name="fornecedor" type="number"></div>
                <div class="field-row"><label for="produto-imagemUrl">URL da Imagem</label><input id="produto-imagemUrl" name="imagemUrl" type="url"></div>
                <button type="submit">Atualizar Produto</button>
            </form>
        </section>

        <section class="panel" id="pedido">
            <h2>Alterar Pedido</h2>
            <form id="form-pedido" class="entity-form">
                <div class="field-row"><label for="pedido-id">ID</label><input id="pedido-id" name="id" type="number" required></div>
                <div class="field-row"><label for="pedido-cliente">Cliente (ID)</label><input id="pedido-cliente" name="cliente" type="number"></div>
                <div class="field-row"><label for="pedido-dataPedido">Data do Pedido</label><input id="pedido-dataPedido" name="dataPedido" type="datetime-local"></div>
                <div class="field-row"><label for="pedido-status">Status</label><select id="pedido-status" name="status">
                    <option value="PENDENTE">Pendente</option>
                    <option value="CONFIRMADO">Confirmado</option>
                    <option value="ENTREGUE">Entregue</option>
                    <option value="CANCELADO">Cancelado</option>
                </select></div>
                <div class="list-group" id="pedido-itens-group">
                    <div class="group-header"><span>Itens do Pedido</span><button type="button" class="small-button" data-add="pedidoItem">+ Adicionar</button></div>
                    <div id="pedido-itens"></div>
                </div>
                <button type="submit">Atualizar Pedido</button>
            </form>
        </section>

        <section class="panel" id="usuario">
            <h2>Alterar Usuário</h2>
            <form id="form-usuario" class="entity-form">
                <div class="field-row"><label for="usuario-id">ID</label><input id="usuario-id" name="id" type="number" required></div>
                <div class="field-row"><label for="usuario-pessoaId">Pessoa ID</label><input id="usuario-pessoaId" name="pessoaId" type="number"></div>
                <div class="field-row"><label for="usuario-role">Role</label><select id="usuario-role" name="role">
                    <option value="ADMIN">Admin</option>
                    <option value="USUARIO">Usuário</option>
                    <option value="GERENTE">Gerente</option>
                </select></div>
                <div class="field-row"><label for="usuario-login">Login</label><input id="usuario-login" name="login" type="text"></div>
                <div class="field-row"><label for="usuario-senha">Senha</label><input id="usuario-senha" name="senhaHash" type="password"></div>
                <div class="field-row"><label for="usuario-descricao">Descrição</label><textarea id="usuario-descricao" name="descricao" rows="2"></textarea></div>
                <button type="submit">Atualizar Usuário</button>
            </form>
        </section>
    </main>
    <aside class="output-panel">
        <h3>Resultado de Edição</h3>
        <pre id="output">Preencha um formulário para ver os dados aqui.</pre>
    </aside>
    <script src="editar.js"></script>
</body>
</html>
