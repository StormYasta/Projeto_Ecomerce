<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Status do Pedido</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Alterar Status do Pedido</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Novo Pedido</a>
                <a href="./itens.html">Itens do Pedido</a>
                <a href="./status.html">Alterar Status</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <!-- BUSCA DO PEDIDO -->
        <section class="search-panel">
            <h2>Buscar Pedido</h2>

            <div class="field-row">
                <label for="search-id">ID do Pedido</label>
                <input id="search-id" type="number" min="1" placeholder="Digite o ID do pedido">
            </div>

            <button type="button" id="btn-search" class="small-button" style="margin-top: 1em;">
                Buscar
            </button>
            <button type="button" id="btn-cancelar" class="small-button">
                Cancelar Pedido
            </button>
        </section>

        <!-- DADOS ATUAIS DO PEDIDO -->
        <section class="panel active" id="section-info">
            <h2>Dados do Pedido</h2>
            <div id="pedido-info" class="view-content">
                <p class="empty-state">Nenhum pedido carregado.</p>
            </div>
        </section>

        <!-- ALTERAR STATUS -->
        <section class="panel active" id="section-status">
            <h2>Atualizar Status</h2>

            <form id="form-status" class="entity-form">

                <input type="hidden" id="pedido-id" name="pedidoId">

                <div class="field-row">
                    <label for="statusId">Novo Status</label>
                    <select id="statusId" name="statusId" required>
                        <option value="1">PENDENTE</option>
                        <option value="2">EM PROCESSAMENTO</option>
                        <option value="3">ENVIADO</option>
                        <option value="4">ENTREGUE</option>
                    </select>
                </div>

                <button type="submit">
                    Atualizar Status
                </button>

            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Terminal</h3>
        <pre id="output">Aguardando ação...</pre>
    </aside>

    <script src="status.js"></script>

</body>

</html>
