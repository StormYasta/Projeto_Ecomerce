<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Novo Pedido</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Novo Pedido</a>
                <a href="./itens.html">Itens do Pedido</a>
                <a href="./status.html">Alterar Status</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <section class="panel active">
            <h2>Criar Pedido</h2>

            <form id="form-pedido" class="entity-form">

                <div class="field-row">
                    <label for="clienteId">ID do Cliente</label>
                    <input id="clienteId" name="clienteId" type="number" min="1" placeholder="Digite o ID do cliente" required>
                </div>

                <button type="submit">
                    Criar Pedido
                </button>

            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando envio...</pre>
    </aside>

    <script src="cadastrar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
