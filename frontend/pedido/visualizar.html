<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Pedidos</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Visualizar Pedidos</div>
        <nav class="nav-bar">
            <div class="crud-links">
                <a href="./cadastrar.html">Novo Pedido</a>
                <a href="./itens.html">Itens do Pedido</a>
                <a href="./status.html">Alterar Status</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">
        <section class="panel active" id="view-panel">
            <h2>Pedidos Cadastrados</h2>

            <div class="view-actions">
                <button id="refresh-data" type="button" class="small-button">Atualizar</button>
                <button id="clear-data"   type="button" class="small-button">Limpar</button>
            </div>

            <div id="view-content" class="view-content"></div>
        </section>
    </main>

    <aside class="output-panel">
        <h3>Terminal</h3>
        <pre id="view-output">Nenhum registro carregado.</pre>
    </aside>

    <script src="visualizar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
