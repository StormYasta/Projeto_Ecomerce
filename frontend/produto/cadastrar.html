<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Cadastro de Produto</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Cadastrar</a>
                <a href="./editar.html">Editar</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <section class="panel active">

            <h2>Novo Produto</h2>

            <form id="form-produto" class="entity-form">

                <div class="field-row">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" required>
                </div>

                <div class="field-row">
                    <label for="descricao">Descrição</label>
                    <input id="descricao" name="descricao" type="text" required>
                </div>

                <div class="field-row">
                    <label for="precoVenda">Preço de Venda (R$)</label>
                    <input id="precoVenda" name="precoVenda" type="text">
                </div>

                <div class="field-row">
                    <label for="precoCusto">Custo (R$)</label>
                    <input id="precoCusto" name="precoCusto" type="text">
                </div>

                <div class="field-row">
                    <label for="estoque">Estoque</label>
                    <input id="estoque" name="estoque" type="number" min="0" required>
                </div>

                <div class="field-row">
                    <label for="fornecedorId">Fornecedor</label>
                    <select id="fornecedorId" name="fornecedorId" required>
                        <option value="" disabled selected>Carregando fornecedores...</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="imagemUrl">URL da Imagem</label>
                    <input id="imagemUrl" name="imagemUrl" type="text">
                </div>

                <button type="submit">
                    Salvar Produto
                </button>

            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando envio...</pre>
    </aside>

    <script src="cadastrar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
