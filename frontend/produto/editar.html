<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Edição de Produto</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Cadastrar</a>
                <a href="./editar.html">Editar</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <!-- BUSCA POR ID -->
        <section class="search-panel">
            <h2>Buscar Produto</h2>

            <div class="field-row">
                <label for="search-id">ID do Produto</label>
                <input id="search-id" type="number" placeholder="Digite o ID">
            </div>

            <button type="button" id="btn-search" class="small-button" style="margin-top: 1em;">
                Buscar
            </button>
            <button type="button" id="btn-delete" class="small-button">
                Inativar Produto
            </button>
        </section>

        <!-- FORMULÁRIO DE EDIÇÃO -->
        <section class="panel active" id="produto">

            <h2>Atualizar Produto</h2>

            <form id="form-produto" class="entity-form">

                <div class="field-row">
                    <label for="id">ID</label>
                    <input id="id" name="id" type="number" required readonly>
                </div>

                <div class="field-row">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text">
                </div>

                <div class="field-row">
                    <label for="descricao">Descrição</label>
                    <input id="descricao" name="descricao" type="text">
                </div>

                <div class="field-row">
                    <label for="precoVenda">Preço de Venda (R$)</label>
                    <input id="precoVenda" name="precoVenda" type="number" min="0" step="0.01">
                </div>

                <div class="field-row">
                    <label for="custo">Custo (R$)</label>
                    <input id="custo" name="custo" type="number" min="0" step="0.01">
                </div>

                <div class="field-row">
                    <label for="estoque">Estoque</label>
                    <input id="estoque" name="estoque" type="number" min="0">
                </div>

                <div class="field-row">
                    <label for="fornecedorId">Fornecedor</label>
                    <select id="fornecedorId" name="fornecedorId">
                        <option value="" disabled selected>Carregando fornecedores...</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="imagemUrl">URL da Imagem</label>
                    <input id="imagemUrl" name="imagemUrl" type="text">
                </div>

                <button type="submit">
                    Atualizar Produto
                </button>

            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando ação...</pre>
    </aside>

    <script src="editar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
