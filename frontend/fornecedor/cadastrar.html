<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Fornecedor</title>
    <link rel="stylesheet" href="../style.css">

    <script>
        if (localStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <header class="topbar">
        <div class="brand">Cadastro de Fornecedor</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Cadastrar</a>
                <a href="./editar.html">Editar</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <section class="panel active">

            <h2>Novo Fornecedor</h2>

            <form id="form-fornecedor" class="entity-form">

                <div class="field-row">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" required>
                </div>

                <div class="field-row">
                    <label for="cnpj">CNPJ</label>
                    <input id="cnpj" name="cnpj" type="text" maxlength="18" required>
                </div>

                <div class="field-row">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>

                <div class="field-row">
                    <label for="telefone">Telefone</label>
                    <input id="telefone" name="telefone" type="text" required>
                </div>

                <div class="field-row">
                    <label for="descricao">Descrição</label>
                    <input id="descricao" name="descricao" type="text">
                </div>

                <button type="submit">
                    Salvar Fornecedor
                </button>

            </form>
        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando envio...</pre>
    </aside>

    <script src="cadastrar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
