<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <header class="topbar">
        <div class="brand">Edição de Cliente</div>
        <nav class="crud-navbar">
            <div class="crud-links">
                <a href="./cadastrar.html">Cadastrar</a>
                <a href="./editar.html">Editar</a>
                <a href="./visualizar.html">Visualizar</a>
                <a href="../dashboard.html">Voltar</a>
            </div>
        </nav>
    </header>

    <main class="page">

        <!-- 🔍 BUSCA POR ID -->
        <section class="search-panel">
            <h2>Buscar Cliente</h2>

            <div class="field-row">
                <label for="search-id">ID do Cliente</label>
                <input id="search-id" type="number" placeholder="Digite o ID">
            </div>

            <button type="button" id="btn-search" class="small-button" style="margin-top: 1em;">
                Buscar
            </button>
            <button type="button" id="btn-delete" class="small-button">
                Inativar Cliente
            </button>
        </section>

        <!-- ✏️ FORMULÁRIO DE EDIÇÃO -->
        <section class="panel active" id="cliente">

            <h2>Atualizar Cliente</h2>

            <form id="form-cliente" class="entity-form">

                <div class="field-row">
                    <label for="pessoaId">ID</label>
                    <input id="pessoaId" name="pessoaId" type="number" required readonly>
                </div>

                <div class="field-row">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" required>
                </div>

                <div class="field-row">
                    <label for="sobrenome">Sobrenome</label>
                    <input id="sobrenome" name="sobrenome" type="text" required>
                </div>

                <div class="field-row">
                    <label for="cpf">CPF</label>
                    <input id="cpf" name="cpf" type="text" required>
                </div>

                <div class="field-row">
                    <label for="statusId">Status</label>
                    <select id="statusId" name="statusId" required>
                        <option value="1">Ativo</option>
                        <option value="2">Inativo</option>
                        <option value="3">Bloqueado</option>
                    </select>
                </div>

                <div class="field-row">
                    <label for="dataNascimento">Data de Nascimento</label>
                    <input id="dataNascimento" name="dataNascimento" type="date" required>
                </div>

                <button type="submit">
                    Atualizar Cliente
                </button>

            </form>

        </section>

    </main>

    <aside class="output-panel">
        <h3>Resultado</h3>
        <pre id="output">Aguardando ação...</pre>
    </aside>

    <script src="editar.js"></script>
    <script src="../utils.js"></script>

</body>

</html>
