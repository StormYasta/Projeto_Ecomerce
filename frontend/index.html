<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div class="brand">Login do Sistema</div>
</header>

<main class="page">

    <section class="panel active">

        <h2>Acessar sistema</h2>

        <form id="login-form" class="entity-form">

            <div class="field-row">
                <label for="login">Login</label>
                <input id="login" name="login" type="text" required>
            </div>

            <div class="field-row">
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password" required>
            </div>

            <button type="submit">Entrar</button>

        </form>

    </section>

</main>

<aside class="output-panel">
    <h3>Status</h3>
    <pre id="output">Aguardando login...</pre>
</aside>

<script>
const API_URL = 'http://localhost:8080/login';

const form = document.getElementById('login-form');
const output = document.getElementById('output');

form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const dto = {
        login: document.getElementById('login').value,
        senha: document.getElementById('senha').value
    };

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dto)
        });

        const result = await response.json();

        if (result === true) {
            output.textContent = "Login válido! Redirecionando...";

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);

        } else {
            output.textContent = "Login ou senha inválidos";
        }

    } catch (error) {
        console.error(error);
        output.textContent = "Erro ao conectar com o servidor";
    }
});
</script>

</body>
</html>
